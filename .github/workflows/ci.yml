name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: true

      # quendor is consumed by other workspace packages through its built
      # output (package.json `exports`), not raw source, so it must be
      # built before type-aware checks run against its dependents.
      - name: Build quendor
        run: vp run quendor#build

      - name: Check (format, lint, types)
        run: vp check

      # Runs the test suite with coverage, then fallow against that coverage —
      # fallow's CRAP score is meaningless without real coverage (it otherwise
      # estimates private functions as untested). This subsumes the test run.
      - name: Test and codebase intelligence
        run: node .vite-hooks/fallow-coverage.mjs

      - name: Build
        run: vp run -r build
