name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: true

      # quendor is consumed by other workspace packages through its built
      # output (package.json `exports`), not raw source, so it must be
      # built before type-aware checks run against its dependents.
      - name: Build quendor
        run: vp run quendor#build

      # The build above regenerates quendor's package.json `bin`/`exports`
      # fields (tsdown writes them in insertion order), which does not
      # match oxfmt's canonical ordering. Re-normalize before the format
      # check below, or it fails on a file no human actually edited.
      - name: Normalize generated package.json
        run: vp check --fix packages/quendor/package.json

      - name: Check (format, lint, types)
        run: vp check

      - name: Codebase intelligence
        run: vp exec fallow

      - name: Test
        run: vp run -r test

      - name: Build
        run: vp run -r build
