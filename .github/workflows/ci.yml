name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: true

      - name: Check (format, lint, types)
        run: vp check

      - name: Codebase intelligence
        run: vp exec fallow

      - name: Test
        run: vp run -r test

      - name: Build
        run: vp run -r build
